<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Menu</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="hero">
    <div>
        <h1>Customer Menu</h1>
        <p>Select items, choose a slot, and add to cart.</p>
    </div>
    <div class="session-card">
        <div id="sessionText"></div>
        <button id="logoutBtn" class="ghost">Logout</button>
    </div>
</header>

<nav class="top-nav">
    <a href="/customer/menu.html" class="active">Menu</a>
    <a href="/customer/cart.html">Cart</a>
    <a href="/customer/orders.html">Orders</a>
</nav>

<main class="grid">
    <section class="card wide">
        <h2>Pickup Slot</h2>
        <select id="slotSelect"></select>
    </section>

    <section class="card wide">
        <h2>Available Menu</h2>
        <button id="refreshMenu">Refresh</button>
        <div id="menuList" class="list"></div>
    </section>
</main>

<div id="toast"></div>
<script src="/js/app.js"></script>
<script src="/js/customer-menu.js"></script>
</body>
</html>
