<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="hero">
    <div>
        <h1>My Orders</h1>
        <p>Track order status and notifications.</p>
    </div>
    <div class="session-card">
        <div id="sessionText"></div>
        <button id="logoutBtn" class="ghost">Logout</button>
    </div>
</header>

<nav class="top-nav">
    <a href="/customer/menu.html">Menu</a>
    <a href="/customer/cart.html">Cart</a>
    <a href="/customer/orders.html" class="active">Orders</a>
</nav>

<main class="grid">
    <section class="card wide">
        <h2>Order History</h2>
        <button id="loadOrdersBtn">Refresh Orders</button>
        <div id="orderList" class="list"></div>
    </section>

    <section class="card wide">
        <h2>Notifications</h2>
        <button id="loadNotificationsBtn">Refresh Notifications</button>
        <div id="notificationList" class="list"></div>
    </section>
</main>

<div id="toast"></div>
<script src="/js/app.js"></script>
<script src="/js/customer-orders.js"></script>
</body>
</html>
