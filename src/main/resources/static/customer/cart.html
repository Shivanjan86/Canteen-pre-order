<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Cart</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="hero">
    <div>
        <h1>Your Cart</h1>
        <p>Review items and place your order.</p>
    </div>
    <div class="session-card">
        <div id="sessionText"></div>
        <button id="logoutBtn" class="ghost">Logout</button>
    </div>
</header>

<nav class="top-nav">
    <a href="/customer/menu.html">Menu</a>
    <a href="/customer/cart.html" class="active">Cart</a>
    <a href="/customer/orders.html">Orders</a>
</nav>

<main class="grid">
    <section class="card wide">
        <h2>Selected Items</h2>
        <div id="cartList" class="list"></div>
        <p><strong>Pickup Slot:</strong> <span id="slotText">-</span></p>
        <p><strong>Total:</strong> Rs <span id="totalText">0</span></p>
        <button id="placeOrderBtn">Place Order</button>
        <button id="clearCartBtn" class="ghost">Clear Cart</button>
    </section>
</main>

<div id="toast"></div>
<script src="/js/app.js"></script>
<script src="/js/customer-cart.js"></script>
</body>
</html>
