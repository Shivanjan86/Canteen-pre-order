<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="hero">
    <div>
        <h1>Staff Dashboard</h1>
        <p>Update order status and monitor customer orders.</p>
    </div>
    <div class="session-card">
        <div id="sessionText"></div>
        <button id="logoutBtn" class="ghost">Logout</button>
    </div>
</header>

<main class="grid">
    <section class="card">
        <h2>Update Order Status</h2>
        <form id="statusForm">
            <input name="orderId" type="number" min="1" placeholder="Order ID" required>
            <select name="status" required>
                <option value="PLACED">PLACED</option>
                <option value="PREPARING">PREPARING</option>
                <option value="READY">READY</option>
                <option value="CANCELLED">CANCELLED</option>
            </select>
            <button type="submit">Update Status</button>
        </form>
    </section>

    <section class="card wide">
        <h2>Customer Orders</h2>
        <form id="fetchOrdersForm" class="inline-form">
            <input name="customerId" type="number" min="1" placeholder="Customer ID" required>
            <button type="submit">Fetch Orders</button>
        </form>
        <div id="orderList" class="list"></div>
    </section>
</main>

<div id="toast"></div>
<script src="/js/app.js"></script>
<script src="/js/staff-dashboard.js"></script>
</body>
</html>
